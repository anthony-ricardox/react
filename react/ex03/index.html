<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Carrega o React, React Dom e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

   <!-- Don't use this in production: -->
   <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>

    <div id="app-js">
        <p>Total: R$ <span id="total"> </span></p>
        <p>Preço: R$ <span id="preco"> </span></p>
        <button id="button"> Comprar </button>
        
    </div>

    <script> 
        const total = document.getElementById('total')
        const preco = document.getElementById('preco')
        const botao = document.getElementById('button')

        let contador = 1

        function atualizar(contador){   
            total.innerText = contador
            preco.innerText = contador * 250

        }
        atualizar(contador)

        function handleClick(){   
            contador++  
            atualizar(contador)
            
        }
         botao.addEventListener('click', handleClick)

    </script>

    <div id="app-react">

    </div>

    <script type="text/babel"> 
        const Comprar = () => { 
        const [contador,setcontador] = React.useState(1)

        /*function handleClick(){ 
            setcontador(contador+1)
        }*/
        return <div>    
            <p>Total: R$ {contador} </p>  
            <p>Preço: R$ {contador * 250}</p>
            <button onClick={()=> setcontador(contador+1)}>Comprar</button>
        </div>
        }

    ReactDOM.createRoot(document.getElementById('app-react')).render(<Comprar/>)
    </script>
</body>
</html>
