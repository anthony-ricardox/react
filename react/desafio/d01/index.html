<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
    <!-- Carrega o React, React Dom e Babel -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Don't use this in production: -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>
    
    <div id="root">

    </div>

     <script type="text/babel" >
   
    const luana = { 
        cliente: 'Luana',
        idade: 22,
        compras: [
            {nome: 'Notebook', preco: 'R$ 2500'  },
            {nome: 'Geladeira' , preco: 'R$ 3000'},
            {nome: 'Smartphone',preco: 'R$ 1500'}
    ],
        ativa: true ,
}

    const mario = { 
        cliente: 'Mario',
        idade: 27,
        compras:[
            {nome: 'Notbook', preco: 'R$ 3000'},
            {nome: 'Geladeira', preco: 'R$ 5000'},  
            {nome: 'Smartphone', preco: 'R$ 2000'}
    ],
        ativa: false
}


    const App = () =>{ 
        const dados = luana
        const total =   dados.compras.map((item) => Number(item.preco.replace('R$ ', ''))).reduce((a, b) => a + b)
       

        return <div>
             <p>Nome: {dados.cliente}</p>
             <p >Idade: {dados.idade} </p>
             <p> Situação:<span style={{color: dados.ativa ? 'green' : 'red'}}> {dados.ativa ? 'Ativa' : 'Inativo'}</span> </p>
             <p> Total: {total}</p>
             {total >= 10000 &&  'Você está gastando muito!!'}
            </div>
    }

    const container = document.getElementById('root')
    const root = ReactDOM.createRoot(container)
    root.render(<App/>)
</script>


</body>
</html>
